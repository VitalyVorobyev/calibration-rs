name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Release quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify release tag matches package versions
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != v* ]]; then
            echo "expected release tag starting with 'v', got ${tag}" >&2
            exit 1
          fi

          tag_version="${tag#v}"
          workspace_version=$(
            awk '
              $0 == "[workspace.package]" { in_section=1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )
          python_version=$(
            awk '
              $0 == "[project]" { in_section=1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' crates/vision-calibration-py/pyproject.toml
          )

          if [[ "$workspace_version" != "$tag_version" ]]; then
            echo "tag version $tag_version != workspace version $workspace_version" >&2
            exit 1
          fi
          if [[ "$python_version" != "$tag_version" ]]; then
            echo "tag version $tag_version != python package version $python_version" >&2
            exit 1
          fi

          echo "release metadata OK for $tag"

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests (release)
        run: cargo test --workspace --all-targets --all-features --release

      - name: Check publishable crate manifests
        run: ./tools/publish-crates.sh check

  publish-crates:
    name: Publish crates.io
    needs: prepare-release
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io (trusted publishing)
        id: crates_io_auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
        run: ./tools/publish-crates.sh publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
