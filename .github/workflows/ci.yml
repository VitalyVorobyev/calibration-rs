name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check version metadata consistency
        shell: bash
        run: |
          workspace_version=$(
            awk '
              $0 == "[workspace.package]" { in_section=1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )
          python_version=$(
            awk '
              $0 == "[project]" { in_section=1; next }
              /^\[/ && in_section { exit }
              in_section && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' crates/vision-calibration-py/pyproject.toml
          )

          if [[ "$workspace_version" != "$python_version" ]]; then
            echo "workspace version $workspace_version != python package version $python_version" >&2
            exit 1
          fi

          echo "version metadata OK: $workspace_version"

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-features

      - name: Cargo doc
        run: cargo doc --no-deps --workspace

  publishability:
    name: Publishability Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check publishable crate manifests
        run: ./tools/publish-crates.sh check

  python-runtime:
    name: Python Runtime Tests
    needs: [build, publishability]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Install Python test tooling
        run: python -m pip install --upgrade pip maturin pytest

      - name: Build Python extension
        run: maturin develop -m crates/vision-calibration-py/Cargo.toml

      - name: Validate Python package
        run: python -m compileall crates/vision-calibration-py/python/vision_calibration

      - name: Run Python runtime tests
        run: python -m pytest crates/vision-calibration-py/tests
