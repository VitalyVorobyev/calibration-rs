name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cargo fmt
        run: cargo fmt --all --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace --all-features

      - name: Cargo doc
        run: cargo doc --no-deps --workspace

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Cargo build (MSRV)
        run: cargo build --workspace --all-features --locked

      - name: Cargo test (MSRV)
        run: cargo test --workspace --locked

  python-runtime:
    name: Python Runtime Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build Python extension
        run: maturin develop -m crates/vision-calibration-py/Cargo.toml

      - name: Validate Python package
        run: python -m compileall crates/vision-calibration-py/python/vision_calibration

      - name: Check typing-stub coverage
        run: python3 scripts/check_pyi_coverage.py --check

      - name: Run Python runtime tests
        run: python -m unittest discover -s crates/vision-calibration-py/tests -p "test_*.py"
